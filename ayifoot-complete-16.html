  return React.createElement('div',{style:{background:"linear-gradient(90deg,#C41230,#003087)",overflow:"hidden",padding:"8px 0",marginBottom:"12px",whiteSpace:"nowrap",borderRadius:8}},

}

const API_HDR = {"x-rapidapi-key": KEYS.FOOTBALL, "x-rapidapi-host": "v3.football.api-sports.io"};

async function apiGet(ep) {
  try {
    const r = await fetch("https://v3.football.api-sports.io" + ep, {headers: API_HDR});
    const j = await r.json();
    return j.response || [];
  } catch(e) { return []; }
}

// ── STATS UI ATOMS ──
function Spin() {
  return <div style={{width:28,height:28,border:`3px solid ${C.bord}`,borderTop:`3px solid ${C.orV}`,borderRadius:"50%",animation:"spin .8s linear infinite",margin:"2rem auto"}}/>;
}

function RatingBadge({r, size=36}) {
  const rv = parseFloat(r) || 0;
  const col = rv>=7.5 ? C.vertV : rv>=6.5 ? C.orV : C.rouge;
  return <div style={{width:size,height:size,borderRadius:"50%",background:col,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:size*.27,color:"#fff",flexShrink:0}}>{rv.toFixed(1)}</div>;
}

function StatBar({label, h, a, hc, ac}) {
  const toN = v => parseInt((v||"0").toString().replace(/[^0-9]/g,"")) || 0;
  const hn = toN(h), an = toN(a), tot = hn+an || 100;
  const hp = (h||"").toString().includes("%") ? parseInt(h) : Math.round(hn/tot*100);
  return (
    <div style={{marginBottom:14,padding:"0.5rem 0.7rem",background:"#fff",borderRadius:8}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.7rem",marginBottom:5}}>
        <span style={{fontWeight:700,color:"#111"}}>{h}</span>
        <span style={{color:"#555",fontSize:"0.62rem"}}>{label}</span>
        <span style={{fontWeight:700,color:"#111"}}>{a}</span>
      </div>
      <div style={{height:6,background:"#e2e2e2",borderRadius:5,overflow:"hidden",display:"flex"}}>
        <div style={{width:`${hp}%`,background:hc||C.rouge,transition:"width .8s"}}/>
        <div style={{width:`${100-hp}%`,background:ac||C.bleuL,transition:"width .8s"}}/>
      </div>
    </div>
  );
}

  const [data, setData] = useState({stats:null,events:null,lineups:null,players:null,h2h:null,standings:null});
  const [loading, setLoading] = useState(true);

  const home = fixture?.teams?.home;
  const away = fixture?.teams?.away;
  const score = fixture?.goals;
  const status = fixture?.fixture?.status;
  const isLive = ["1H","2H","HT","ET"].includes(status?.short);
  const isHTS = fixture?.isHTSCO;

  // document.title dynamique — utile pour l'onglet navigateur et le titre
  // affiché si l'utilisateur partage ce lien après navigation. Ne remplace
  // pas un vrai SEO par-page : cette app est une SPA sans rendu serveur,
  // donc Google indexe le <title> statique du HTML, pas celui-ci.
  useEffect(()=>{
    if(!home?.name || !away?.name) return;
    const prevTitle = document.title;
    document.title = `${home.name} vs ${away.name} — Ayifoot`;
    return ()=>{ document.title = prevTitle; };
  },[home?.name,away?.name]);

  useEffect(() => {
    if (!fixture) return;
    if (isHTS) {
      setData({stats:HAITI_SCO.stats,events:HAITI_SCO.events,lineups:HAITI_SCO.lineups,players:HAITI_SCO.players,h2h:[],standings:null});
      setLoading(false); return;
    }
    const fid = fixture.fixture?.id || fixture.fid;
    if (!fid) { setLoading(false); return; }
    setLoading(true);
    Promise.all([
      apiGet(`/fixtures/statistics?fixture=${fid}`),
      apiGet(`/fixtures/events?fixture=${fid}`),
      apiGet(`/fixtures/lineups?fixture=${fid}`),
      apiGet(`/fixtures/players?fixture=${fid}`),
      apiGet(`/fixtures/headtohead?h2h=${home?.id}-${away?.id}&last=8`),
      fixture.league?.id ? apiGet(`/standings?league=${fixture.league.id}&season=${fixture.league.season||2026}`) : Promise.resolve([]),
    ]).then(([stats,events,lineups,players,h2h,standings]) => {

      setLoading(false);

                    return indices.map(i => {
                      const s = all[i];
                      return <StatBar key={i} label={s.type} h={s.value??0} a={data.stats[1]?.statistics?.[i]?.value??0} hc={C.rouge} ac={C.bleuL}/>;
                    });
                  })()}

          {tab==="table" && (

                const grp = groups.find(g=>g.some(row=>row.team?.id===home?.id||row.team?.id===away?.id)) || groups[0] || [];

                  <div style={{background:"#fff",border:`1px solid #ddd`,borderRadius:10,overflow:"hidden"}}>

                      </tr></thead>
                      <tbody>
                        {grp.map((row,i) => {
                          const isHT = row.team?.name?.toLowerCase().includes("haïti")||row.team?.name?.toLowerCase().includes("haiti");
                          const isTeam = row.team?.id===home?.id||row.team?.id===away?.id;
                          return (
                            <tr key={i} style={{background:isHT?"#fff5f5":isTeam?"#f5f8ff":"#fff",borderLeft:isHT?`2px solid ${C.rouge}`:"none",borderBottom:`1px solid #eee`}}>
                              <td style={{padding:"0.48rem 0.4rem",textAlign:"center",fontWeight:i<2?700:400,color:i<2?C.vertV:"#666",fontSize:"0.66rem"}}>{row.rank}</td>
                              <td style={{padding:"0.48rem 0.4rem"}}><div style={{display:"flex",alignItems:"center",gap:5}}>{row.team?.logo&&<img src={row.team.logo} alt="" style={{width:14,height:14,objectFit:"contain"}} onError={e=>e.target.style.display="none"}/>}<span style={{fontWeight:isHT||isTeam?700:400,fontSize:"0.68rem",color:"#111"}}>{row.team?.name}</span></div></td>
                              <td style={{padding:"0.48rem 0.4rem",textAlign:"center",color:"#666"}}>{row.all?.played}</td>
                              <td style={{padding:"0.48rem 0.4rem",textAlign:"center",color:"#666"}}>{row.all?.win}</td>

                            </tr>
                          );
                        })}
                      </tbody>
                    </table>

              })() : <div style={{background:"#fff",border:`1px solid #ddd`,borderRadius:10,padding:"2rem",textAlign:"center"}}><div style={{fontSize:"0.72rem",color:"#666"}}>Classement non disponible</div></div>}

}

// ── STATS PANEL ──
function StatsPanel({setSelectedMatch}) {
  const [view, setView] = useState("live");
  const [comp, setComp] = useState(COMPS_LIST[0]);
  const [sub, setSub] = useState("matches");
  const [matches, setMatches] = useState([]);
  const [standings, setStandings] = useState([]);
  const [scorers, setScorers] = useState([]);
  const [liveM, setLiveM] = useState([]);
  const [loading, setLoading] = useState(false);
  const [sType, setSType] = useState("scorers");

  useEffect(() => {
    const fetch_ = () => apiGet("/fixtures?live=all").then(d => { if (d.length) setLiveM(d); });
    fetch_();
    const id = setInterval(fetch_, 15000);
    return () => clearInterval(id);
  }, []);

  useEffect(() => {
    if (view !== "comp") return;
    setLoading(true);
    if (sub === "matches") apiGet(`/fixtures?league=${comp.id}&season=${comp.season}&status=FT&last=15`).then(d=>{setMatches(d);setLoading(false);}).catch(()=>setLoading(false));
    else if (sub === "standings") apiGet(`/standings?league=${comp.id}&season=${comp.season}`).then(d=>{setStandings(d);setLoading(false);}).catch(()=>setLoading(false));
    else apiGet(`/players/${sType==="scorers"?"topscorers":"topassists"}?league=${comp.id}&season=${comp.season}`).then(d=>{setScorers(d);setLoading(false);}).catch(()=>setLoading(false));
  }, [view, comp, sub, sType]);

  const MCard = ({m}) => {
    const isL = ["1H","2H","HT","ET"].includes(m?.fixture?.status?.short||m?.st);
    const hn = m.teams?.home?.name||m.hn||"";
    const an = m.teams?.away?.name||m.an||"";
    const hl = m.teams?.home?.logo||m.hlogo;
    const al = m.teams?.away?.logo||m.alogo;
    const gh = m.goals?.home??m.gh??"-";
    const ga = m.goals?.away??m.ga??"-";
    const min = m.fixture?.status?.elapsed||m.min;
    return (
      <div onClick={()=>setSelectedMatch(m)} style={{background:C.card,border:`1px solid ${isL?"rgba(28,112,69,.44)":C.bord}`,borderRadius:9,marginBottom:6,cursor:"pointer",overflow:"hidden"}}>
        <div style={{padding:"0.42rem 0.8rem",display:"flex",alignItems:"center",gap:6,borderBottom:`1px solid ${C.bord2||"rgba(255,255,255,0.03)"}`}}>
          <span style={{fontSize:"0.5rem",color:C.muted}}>{m.league?.name||m.comp}</span>
          {isL && <span style={{background:C.vertV+"22",color:C.vertV,border:`1px solid ${C.vertV}44`,fontSize:"0.44rem",fontWeight:700,padding:"0.1rem 0.4rem",borderRadius:3}}>🔴 {min}'</span>}

// ════════════════════════════════════════════════════════
// DATA CONTRACT v1 — Pipeline unique : API → normalize → validate → UI
// Aucun composant ne doit lire un match sans qu'il soit passé
// par normalizeMatch(). Empêche la divergence de statut entre
// objets issus du même batch.
//
// __meta.lifecycle (≠ match.st qui est le code technique brut
// "1H"/"FT"/etc.) : "live" | "final" | "pending"
// __meta.source    : "api" | "fallback" | "mock"
// __meta.confidence: "high" (api) | "low" (fallback/mock)
//
// Note: validateMatch() rejette par filter plutôt que throw —
// un objet malformé issu d'une réponse API imprévisible ne doit
// jamais faire planter tout l'onglet, juste être exclu du rendu.
// ════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════
// SCHEMA_VERSION — single source of truth du contrat de données.
// Tout objet __meta porte sa version. validateMatch() rejette
// les objets d'une version inconnue, ce qui empêche le mélange
// silencieux d'anciens formats (ex: __meta.status legacy) avec
// le format actuel (__meta.lifecycle) pendant une migration.
// ════════════════════════════════════════════════════════
const SCHEMA_VERSION = 2; // v1 = __meta.status (obsolète) · v2 = __meta.lifecycle + confidence

// Migration layer minimal — évite la rigidité du rejet pur.
// Un objet v1 n'est pas perdu : il est élevé à v2 avant validation,
// au lieu d'être bloqué net. Si un futur SCHEMA_VERSION=3 apparaît,
// ajouter un cas ici plutôt que de durcir validateMatch davantage.
function migrateMatch(m){
  if(!m?.__meta) return m; // rien à migrer, normalizeMatch gère l'absence de __meta
  if(m.__meta.version===SCHEMA_VERSION) return m;
  if(m.__meta.version===1 || m.__meta.status){
    // v1 → v2 : status renommé lifecycle, confidence déduite de source
    return {
      ...m,
      __meta:{
        version: SCHEMA_VERSION,
        source: m.__meta.source ?? "mock",
        lifecycle: m.__meta.lifecycle ?? m.__meta.status ?? "pending",
        fetchedAt: m.__meta.fetchedAt ?? null,
        confidence: m.__meta.confidence ?? (m.__meta.source==="api"?"high":"low"),
      },
    };
  }
  return m; // version inconnue future : laissé tel quel, validateMatch décidera
}

function inferLifecycle(status){
  if(status==="FT") return "final";
  if(["1H","2H","HT","ET"].includes(status)) return "live";
  return "pending";
}

// Point de lecture unique pour l'UI — lecture pure, zéro calcul.
// inferLifecycle() n'est appelée qu'une fois, dans normalizeMatch().
// Si __meta.lifecycle est absent, c'est que l'objet n'est jamais
// passé par le pipeline (bug d'intégration) — on le signale
// bruyamment plutôt que de déduire silencieusement une valeur,
// ce qui créerait une seconde source de vérité invisible.
function getLifecycle(m){
  if(!m?.__meta?.lifecycle){
    console.error("[getLifecycle] objet hors pipeline, jamais normalisé:",m);
    return "pending";
  }
  return m.__meta.lifecycle;
}

// ════════════════════════════════════════════════════════
// ERROR BOUNDARY — isolation par zone métier, pas un boundary
// global. Un bug dans Scores ne doit jamais faire disparaître
// le reste du site (TV, News, Stats). React exige une classe
// (componentDidCatch n'existe pas en hook) — seule classe du
// fichier, justifiée par cette contrainte d'API React.
// ════════════════════════════════════════════════════════
class ErrorBoundary extends React.Component{
  constructor(props){
    super(props);
    this.state={hasError:false};
  }
  static getDerivedStateFromError(){
    return {hasError:true};
  }
  componentDidCatch(error,info){
    console.error(`[ErrorBoundary:${this.props.zone||"?"}]`,error,info?.componentStack);
  }
  render(){
    if(this.state.hasError){
      return this.props.fallback || React.createElement('div',{style:{padding:"1rem",textAlign:"center",color:C.rouge,fontSize:"0.72rem"}},"⚠️ ",this.props.zone||"Section"," temporairement indisponible");
    }
    return this.props.children;
  }
}

// Factory obligatoire — seul point d'entrée pour créer un objet match affichable
function normalizeMatch(raw,{source,fetchedAt}){
  const status = raw?.fixture?.status?.short ?? raw?.st ?? "NS";
  return {
    id: raw?.fixture?.id ?? raw?.id ?? null,
    hn: raw?.teams?.home?.name ?? raw?.hn ?? "?",
    hlogo: raw?.teams?.home?.logo ?? raw?.hlogo ?? null,
    an: raw?.teams?.away?.name ?? raw?.an ?? "?",
    alogo: raw?.teams?.away?.logo ?? raw?.alogo ?? null,
    gh: raw?.goals?.home ?? raw?.gh ?? null,
    ga: raw?.goals?.away ?? raw?.ga ?? null,
    min: raw?.fixture?.status?.elapsed ?? raw?.min ?? null,
    comp: raw?.league?.name ?? raw?.comp ?? "?",
    grp: raw?.league?.round ?? raw?.grp ?? "?",
    st: status,
    // Contrat formel — porté par l'objet, jamais déduit ailleurs
    __meta:{
      version: SCHEMA_VERSION,
      source,                              // "api" | "fallback" | "mock"
      lifecycle: inferLifecycle(status),    // "live" | "final" | "pending"
      fetchedAt: fetchedAt ?? null,
      confidence: source==="api"?"high":"low",
    },
  };
}

// Validation centralisée — détecte les incohérences avant affichage.
// Rejette (ne throw jamais) pour ne pas faire planter le rendu global.
function validateMatch(m){
  const errors=[];
  if(!m.id) errors.push("id manquant");
  if(!m.__meta){ errors.push("__meta manquant"); return {valid:false,errors}; }
  if(!m.__meta.lifecycle) errors.push("__meta.lifecycle manquant"); // anti-corruption : objet __meta présent mais incomplet
  if(m.__meta.version!==SCHEMA_VERSION) errors.push(`version __meta obsolète (${m.__meta.version} attendu ${SCHEMA_VERSION})`);
  if(m.__meta.lifecycle==="final" && (m.gh==null||m.ga==null)) errors.push("match final sans score");
  if(m.__meta.lifecycle==="live" && m.min==null) errors.push("match live sans minute");
  if(m.gh!=null && m.gh<0) errors.push("score home négatif");
  if(m.ga!=null && m.ga<0) errors.push("score away négatif");
  if(m.__meta.source==="api" && !m.__meta.fetchedAt) errors.push("source api sans fetchedAt");
  return {valid:errors.length===0,errors};
}

// Snapshot léger — un match "final" est figé une fois rendu : on
// marque l'instant exact où il a été verrouillé. Garde-fou contre
// une éventuelle réécriture de score après coup côté API, pas un
// système critique (API-Football ne republie pas un FT en pratique
// d'après l'usage observé sur ce projet, mais le coût de la garde
// est nul et évite une classe de bug si jamais le cas survient).
function snapshotMatch(m){
  if(m.__meta.lifecycle==="final" && !m.__meta.locked){
    return {...m,__meta:{...m.__meta,locked:true,snapshotAt:Date.now()}};
  }
  return m;
}

// Point d'entrée unique pour tout batch — pipeline complet :
// raw → normalize → migrate → validate → snapshot → store (React state)
// garantit que tous les objets d'un même appel API partagent
// exactement le même fetchedAt, évitant la divergence silencieuse
// entre matchs d'un même batch.
function ingestMatches(rawList,source){
  const fetchedAt=Date.now();
  return (rawList||[])
    .map(raw=>normalizeMatch(raw,{source,fetchedAt}))
    .map(migrateMatch)
    .filter(m=>{
      const {valid,errors}=validateMatch(m);
      if(!valid) console.warn("[ingestMatches] rejeté:",m.id,errors);
      return valid;
    })

// ── COUNTDOWN ──
function useCD(date){
  const [cd,setCd]=useState({d:"--",h:"--",m:"--",s:"--"});
  useEffect(()=>{
    const tick=()=>{
      const diff=new Date(date)-new Date();
      if(diff<=0){setCd({d:"00",h:"00",m:"00",s:"00"});return;}
      setCd({d:String(Math.floor(diff/86400000)).padStart(2,"0"),h:String(Math.floor(diff%86400000/3600000)).padStart(2,"0"),m:String(Math.floor(diff%3600000/60000)).padStart(2,"0"),s:String(Math.floor(diff%60000/1000)).padStart(2,"0")});
    };
    tick();const id=setInterval(tick,1000);return()=>clearInterval(id);
  },[date]);
  return cd;
}

function CDDisplay({date}){
  const cd=useCD(date);
  return React.createElement('div',{style:{display:"flex",gap:"0.7rem"}},
    [["d","Jours"],["h","Hrs"],["m","Min"],["s","Sec"]].map(([k,l])=>
      React.createElement('div',{key:k,style:{textAlign:"center"}},
        React.createElement('div',{style:{fontWeight:800,fontSize:"1.5rem",lineHeight:1,color:C.blanc}},cd[k]),
        React.createElement('div',{style:{fontSize:"0.42rem",color:C.muted,letterSpacing:"0.14em",textTransform:"uppercase",marginTop:2}},l)
      )
    )
  );
}

// ── LIVE SIM + REAL API — Couche de vérité: loading → live → fallback ──
function useLive(){
  const [live,setLive]=useState(()=>ingestMatches(LIVE_INIT,"fallback"));
  const [apiStatus,setApiStatus]=useState("loading"); // loading | live | fallback | error

  useEffect(()=>{
    const fetchReal=async()=>{
      try{
        const r=await fetch("https://v3.football.api-sports.io/fixtures?live=all",{
          headers:{"x-rapidapi-key":KEYS.FOOTBALL,"x-rapidapi-host":"v3.football.api-sports.io"}
        });
        const j=await r.json();
        if(j.response&&j.response.length>0){
          setLive(ingestMatches(j.response,"api"));
          setApiStatus("live");
        } else {
          // API a répondu mais aucun match en cours → fallback explicite, jamais déguisé en "live"
          setLive(ingestMatches(LIVE_INIT,"fallback"));
          setApiStatus("fallback");
        }
      }catch(e){
        setLive(ingestMatches(LIVE_INIT,"fallback"));
        setApiStatus("error");
      }
    };

    fetchReal();
    const id=setInterval(fetchReal,15000);
    return()=>clearInterval(id);
  },[]);

  return {live,apiStatus};
}

// ── FETCH GROUPE C — CLASSEMENT RÉEL ──
function useGroupCStandings(){
  const [allGroups,setAllGroups]=useState([]);
  const [standings,setStandings]=useState(STANDINGS);
  const [groupStatus,setGroupStatus]=useState("loading");
  const [haitiGroupName,setHaitiGroupName]=useState(null);

  useEffect(()=>{
    const fetchStandings=async()=>{
      try{
        const r=await fetch("https://v3.football.api-sports.io/standings?league=1&season=2026",{
          headers:{"x-rapidapi-key":KEYS.FOOTBALL,"x-rapidapi-host":"v3.football.api-sports.io"}
        });
        const j=await r.json();
        console.log("[useGroupCStandings] statut HTTP:",r.status,"nb groupes:",j.response?.[0]?.league?.standings?.length,"erreurs API:",j.errors);
        if(j.errors&&Object.keys(j.errors).length>0){
          console.error("[useGroupCStandings] API a renvoyé des erreurs:",j.errors);
        }
        const groups=j.response?.[0]?.league?.standings||[];
        if(groups.length>0){
          // Normalise les 12 groupes pour l'affichage, pas juste celui de Haïti
          const normalized=groups.map(g=>g.map(row=>({
            pos:row.rank,
            name:row.team?.name,
            logo:row.team?.logo,
            j:row.all?.played??0,
            v:row.all?.win??0,
            n:row.all?.draw??0,
            d:row.all?.lose??0,
            bp:row.all?.goals?.for??0,
            bc:row.all?.goals?.against??0,
            pts:row.points??0,
            ht:row.team?.name?.toLowerCase().includes("hait"),
            group:row.group,
          })));
          setAllGroups(normalized);
          const groupeHaiti=normalized.find(g=>g.some(team=>team.ht));
          if(groupeHaiti){
            setStandings(groupeHaiti);
            setHaitiGroupName(groupeHaiti[0]?.group||null);
          }
          setGroupStatus("live");
        } else {
          // Secours : utilise les données pré-chargées (OTHER_GROUPS + STANDINGS)
          // plutôt que de laisser allGroups vide. Statut "fallback", jamais "live".
          const fallback=[
            STANDINGS.map(t=>({...t,group:"Groupe C"})),
            ...Object.entries(OTHER_GROUPS).map(([letter,g])=>
              g.teams.map(t=>({...t,group:`Groupe ${letter}`}))
            ),
          ];
          setAllGroups(fallback);
          setHaitiGroupName("Groupe C");
          setGroupStatus("fallback");
        }
      }catch(e){
        const fallback=[
          STANDINGS.map(t=>({...t,group:"Groupe C"})),
          ...Object.entries(OTHER_GROUPS).map(([letter,g])=>
            g.teams.map(t=>({...t,group:`Groupe ${letter}`}))
          ),
        ];
        setAllGroups(fallback);
        setHaitiGroupName("Groupe C");
        setGroupStatus("error");
      }
    };
    fetchStandings();
    const id=setInterval(fetchStandings,300000); // refresh 5min
    return()=>clearInterval(id);
  },[]);

  return {standings,groupStatus,allGroups,haitiGroupName};
}

// ── FETCH NEWS ──
function useNews(){
  const [news,setNews]=useState(NEWS_INIT);
  const [newsStatus,setNewsStatus]=useState("loading");
  const newsByCompRef=useRef({}); // accumulation persistante par compétition entre les rotations
  useEffect(()=>{
    // Couverture complète demandée : Mondial, Haïti, les 5 grands championnats,
    // Écosse, les 3 coupes européennes, et les grandes coupes nationales/supercoupes.
    // Pour rester sûr sur le quota SerpApi, on ne fait JAMAIS toutes ces requêtes
    // d'un coup : 4 par cycle, en rotation — sur ~5 cycles (10min) tout est couvert,
    // et le coût reste fixe à 4 requêtes/2min, identique à avant.
    const ALL_QUERIES=[
      {comp:"🌍 Mondial",tag:"🌍 MONDIAL",q:"FIFA World Cup 2026 news"},
      {comp:"🇭🇹 Haïti",tag:"🇭🇹 HAÏTI",q:"Haiti Grenadiers football Coupe Monde 2026"},
      {comp:"⭐ Champions League",tag:"⭐ CHAMPIONS LEAGUE",q:"UEFA Champions League news"},
      {comp:"🥈 Europa League",tag:"🥈 EUROPA LEAGUE",q:"UEFA Europa League news"},
      {comp:"🥉 Conference League",tag:"🥉 CONFERENCE LEAGUE",q:"UEFA Europa Conference League news"},
      {comp:"🏴 Premier League",tag:"🏴 PREMIER LEAGUE",q:"Premier League football news"},
      {comp:"🇪🇸 La Liga",tag:"🇪🇸 LA LIGA",q:"La Liga Spain football news"},
      {comp:"🇩🇪 Bundesliga",tag:"🇩🇪 BUNDESLIGA",q:"Bundesliga Germany football news"},
      {comp:"🇮🇹 Serie A",tag:"🇮🇹 SERIE A",q:"Serie A Italy football news"},
      {comp:"🇫🇷 Ligue 1",tag:"🇫🇷 LIGUE 1",q:"Ligue 1 France football news"},
      {comp:"🇵🇹 Liga Portugal",tag:"🇵🇹 LIGA PORTUGAL",q:"Liga Portugal football news"},
      {comp:"🏴󠁧󠁢󠁳󠁣󠁴󠁿 Écosse",tag:"🏴󠁧󠁢󠁳󠁣󠁴󠁿 ÉCOSSE",q:"Scottish Premiership football news"},
      {comp:"🏆 Coupes nationales",tag:"🏆 COUPES",q:"FA Cup Coupe de France DFB Pokal Copa del Rey news"},
      {comp:"🏅 Supercoupes",tag:"🏅 SUPERCOUPE",q:"UEFA Super Cup Supercoupe football news"},
    ];
    const BATCH_SIZE=4;
    let cycle=0;
    const fetch_=async()=>{
      // Sélectionne 4 compétitions différentes à chaque appel, en boucle sur la liste
      const start=(cycle*BATCH_SIZE)%ALL_QUERIES.length;
      const batch=[];
      for(let k=0;k<BATCH_SIZE;k++) batch.push(ALL_QUERIES[(start+k)%ALL_QUERIES.length]);
      cycle++;
      try{
        const results=await Promise.all(
          batch.map(async({comp,tag,q})=>{
            try{
              const r=await fetch(`/api/news?q=${encodeURIComponent(q)}`);
              const j=await r.json();
              return {comp,items:(j.news_results||[]).slice(0,5).map((n,i)=>({
                id:`${comp}-${Date.now()}-${i}`,
                tag,
                comp,
                title:n.title,
                source:n.source||"Sport",
                date:n.date||"Récent",
                link:n.link||"#",
                thumbnail:n.thumbnail||null,
                hot:i===0,
                pinned:false,
              }))};
            }catch(e){ return {comp,items:[]}; }
          })
        );
        let gotAny=false;
        results.forEach(({comp,items})=>{
          if(items.length>0){ newsByCompRef.current[comp]=items; gotAny=true; }
        });
        const merged=Object.values(newsByCompRef.current).flat();
        if(merged.length>0||gotAny){
          // Mélange par compétition (round-robin), pas un bloc par bloc
          const byComp=newsByCompRef.current;
          const comps=Object.keys(byComp);
          const interleaved=[];
          let i=0;
          while(comps.some(c=>byComp[c][i])){
            comps.forEach(c=>{ if(byComp[c][i]) interleaved.push(byComp[c][i]); });
            i++;
          }
          setNews(interleaved.slice(0,40));
          setNewsStatus("live");
        } else if(Object.keys(newsByCompRef.current).length===0){
          setNewsStatus("empty");
        }
      }catch(e){
        if(Object.keys(newsByCompRef.current).length===0) setNewsStatus("blocked");
      }
    };
    fetch_();
    const id=setInterval(fetch_,120000);
    return()=>clearInterval(id);
  },[]);
  return {news,setNews,newsStatus};
}
