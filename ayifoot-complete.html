const API_HDR = {"x-rapidapi-key": KEYS.FOOTBALL, "x-rapidapi-host": "v3.football.api-sports.io"};

async function apiGet(ep) {
  try {
    const r = await fetch("https://v3.football.api-sports.io" + ep, {headers: API_HDR});
    const j = await r.json();
    return j.response || [];
  } catch(e) { return []; }
}

function Spin() {
  return <div style={{width:28,height:28,border:`3px solid ${T.border}`,borderTop:`3px solid ${T.oV}`,borderRadius:"50%",animation:"spin .8s linear infinite",margin:"2rem auto"}}/>;
}

function RatingBadge({r, size=36}) {
  const rv = parseFloat(r) || 0;
  const col = rv>=7.5 ? T.vtV : rv>=6.5 ? T.oV : T.rv;
  return <div style={{width:size,height:size,borderRadius:"50%",background:col,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:size*.27,color:"#fff",flexShrink:0}}>{rv.toFixed(1)}</div>;
}

function StatBar({label, h, a, hc, ac}) {
  const toN = v => parseInt((v||"0").toString().replace(/[^0-9]/g,"")) || 0;
  const hn = toN(h), an = toN(a), tot = hn+an || 100;
  const hp = (h||"").toString().includes("%") ? parseInt(h) : Math.round(hn/tot*100);
  return (
    <div style={{marginBottom:9}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.68rem",marginBottom:3}}>
        <span style={{fontWeight:700,color:hc||T.rv}}>{h}</span>
        <span style={{color:T.mu,fontSize:"0.54rem"}}>{label}</span>
        <span style={{fontWeight:700,color:ac||T.bl}}>{a}</span>
      </div>
      <div style={{height:5,background:T.card3||"#172035",borderRadius:5,overflow:"hidden",display:"flex"}}>
        <div style={{width:`${hp}%`,background:hc||T.rv,transition:"width .8s"}}/>
        <div style={{width:`${100-hp}%`,background:ac||T.bl,transition:"width .8s"}}/>
      </div>
    </div>
  );
}

// ── MATCH DETAIL ──
function MatchDetail({fixture, onBack}) {
  const [tab, setTab] = useState("overview");
  const [data, setData] = useState({stats:null,events:null,lineups:null,players:null,h2h:null,standings:null});
  const [loading, setLoading] = useState(true);

  const home = fixture?.teams?.home;
  const away = fixture?.teams?.away;
  const score = fixture?.goals;
  const status = fixture?.fixture?.status;
  const isLive = ["1H","2H","HT","ET"].includes(status?.short);
  const isHTS = fixture?.isHTSCO;

  useEffect(() => {
    if (!fixture) return;
    if (isHTS) {
      setData({stats:HAITI_SCO.stats,events:HAITI_SCO.events,lineups:HAITI_SCO.lineups,players:HAITI_SCO.players,h2h:[],standings:null});
      setLoading(false); return;
    }
    const fid = fixture.fixture?.id || fixture.fid;
    if (!fid) { setLoading(false); return; }
    setLoading(true);
    Promise.all([
      apiGet(`/fixtures/statistics?fixture=${fid}`),
      apiGet(`/fixtures/events?fixture=${fid}`),
      apiGet(`/fixtures/lineups?fixture=${fid}`),
      apiGet(`/fixtures/players?fixture=${fid}`),
      apiGet(`/fixtures/headtohead?h2h=${home?.id}-${away?.id}&last=8`),
      fixture.league?.id ? apiGet(`/standings?league=${fixture.league.id}&season=${fixture.league.season||2026}`) : Promise.resolve([]),
    ]).then(([stats,events,lineups,players,h2h,standings]) => {
      setData({stats,events,lineups,players,h2h,standings});
      setLoading(false);
    });
  }, [fixture?.fixture?.id]);

  const TABS = [["overview","📋 Overview"],["stats","📊 Stats"],["timeline","⏱️ Timeline"],["lineups","👥 Lineups"],["players","👤 Joueurs"],["h2h","⚔️ H2H"],["table","🏆 Table"]];

  return (
    <div style={{animation:"fadeIn .3s ease"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
        <button onClick={onBack} style={{background:T.card2,border:`1px solid ${T.border}`,color:T.blanc,padding:"0.3rem 0.65rem",borderRadius:6,cursor:"pointer",fontSize:"0.65rem",fontFamily:"inherit"}}>← Retour</button>
        <span style={{fontSize:"0.58rem",color:T.mu}}>{fixture?.league?.name} · {fixture?.league?.round}</span>
        {isLive && <span style={{background:T.vtV+"22",color:T.vtV,border:`1px solid ${T.vtV}44`,fontSize:"0.44rem",fontWeight:700,padding:"0.1rem 0.4rem",borderRadius:3}}>🔴 LIVE {status?.elapsed}'</span>}
      </div>
      {/* Score */}
      <div style={{background:"linear-gradient(135deg,rgba(11,27,94,.4),rgba(196,18,48,.25))",border:`1px solid ${T.border}`,borderRadius:10,padding:"1.2rem",marginBottom:12}}>

                          <div style={{textAlign:"center"}}><div style={{fontWeight:800,fontSize:"1rem",color:T.blanc}}>{(m.goals?.home??"-")} – {(m.goals?.away??"-")}</div><div style={{fontSize:"0.48rem",color:T.mu}}>{new Date(m.fixture?.date).toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"2-digit"})}</div></div>
                          <div style={{display:"flex",alignItems:"center",gap:6,flexDirection:"row-reverse"}}>{m.teams.away.logo&&<img src={m.teams.away.logo} alt="" style={{width:18,height:18,objectFit:"contain"}} onError={e=>e.target.style.display="none"}/>}<span style={{fontSize:"0.72rem",fontWeight:600,textAlign:"right"}}>{m.teams.away.name}</span></div>
                        </div>
                      </div>
                    ))}
                  </div>
                );
              })() : <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:10,padding:"2rem",textAlign:"center"}}><div style={{fontSize:"0.72rem",color:T.mu}}>Pas d'historique disponible</div></div>}
            </div>
          )}

          {/* TABLE */}
          {tab==="table" && (
            <div>
              {data.standings?.length > 0 ? (() => {
                const groups = data.standings[0]?.league?.standings || [];
                const grp = groups[0] || [];
                return (
                  <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:10,overflow:"hidden"}}>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:"0.7rem"}}>
                      <thead><tr style={{background:"rgba(255,255,255,.025)"}}>
                        {["#","Équipe","J","V","N","D","Pts","Forme"].map(h=><th key={h} style={{padding:"0.42rem 0.4rem",fontSize:"0.48rem",color:T.mu,fontWeight:400,textAlign:h==="Équipe"?"left":"center",letterSpacing:"0.08em"}}>{h}</th>)}
                      </tr></thead>
                      <tbody>
                        {grp.map((row,i) => {
                          const isHT = row.team?.name?.toLowerCase().includes("haïti")||row.team?.name?.toLowerCase().includes("haiti");
                          const isTeam = row.team?.id===home?.id||row.team?.id===away?.id;
                          return (
                            <tr key={i} style={{background:isHT?"rgba(11,27,94,.2)":isTeam?"rgba(255,255,255,.03)":"transparent",borderLeft:isHT?`2px solid ${T.rv}`:"none",borderBottom:`1px solid ${T.b2||"rgba(255,255,255,0.03)"}`}}>
                              <td style={{padding:"0.48rem 0.4rem",textAlign:"center",fontWeight:i<2?700:400,color:i<2?T.vtV:T.mu,fontSize:"0.66rem"}}>{row.rank}</td>
                              <td style={{padding:"0.48rem 0.4rem"}}><div style={{display:"flex",alignItems:"center",gap:5}}>{row.team?.logo&&<img src={row.team.logo} alt="" style={{width:14,height:14,objectFit:"contain"}} onError={e=>e.target.style.display="none"}/>}<span style={{fontWeight:isHT||isTeam?700:400,fontSize:"0.68rem"}}>{row.team?.name}</span></div></td>
                              <td style={{padding:"0.48rem 0.4rem",textAlign:"center",color:T.mu}}>{row.all?.played}</td>
                              <td style={{padding:"0.48rem 0.4rem",textAlign:"center",color:T.mu}}>{row.all?.win}</td>
                              <td style={{padding:"0.48rem 0.4rem",textAlign:"center",color:T.mu}}>{row.all?.draw}</td>
                              <td style={{padding:"0.48rem 0.4rem",textAlign:"center",color:T.mu}}>{row.all?.lose}</td>
                              <td style={{padding:"0.48rem 0.4rem",textAlign:"center",fontWeight:800,color:T.blanc,fontSize:"0.78rem"}}>{row.points}</td>
                              <td style={{padding:"0.48rem 0.4rem",textAlign:"center"}}><div style={{display:"flex",gap:2,justifyContent:"center"}}>{(row.form||"").split("").slice(-5).map((f,fi)=><div key={fi} style={{width:8,height:8,borderRadius:"50%",background:f==="W"?T.vtV:f==="L"?T.rv:T.or||C.or,flexShrink:0}}/>)}</div></td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                );
              })() : <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:10,padding:"2rem",textAlign:"center"}}><div style={{fontSize:"0.72rem",color:T.mu}}>Classement non disponible</div></div>}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── STATS PANEL ──
function StatsPanel({setSelectedMatch}) {
  const [view, setView] = useState("live");
  const [comp, setComp] = useState(COMPS_LIST[0]);
  const [sub, setSub] = useState("matches");
  const [matches, setMatches] = useState([]);
  const [standings, setStandings] = useState([]);
  const [scorers, setScorers] = useState([]);
  const [liveM, setLiveM] = useState([]);
  const [loading, setLoading] = useState(false);
  const [sType, setSType] = useState("scorers");

  useEffect(() => {
    const fetch_ = () => apiGet("/fixtures?live=all").then(d => { if (d.length) setLiveM(d); });
    fetch_();
    const id = setInterval(fetch_, 15000);
    return () => clearInterval(id);
  }, []);

  useEffect(() => {
    if (view !== "comp") return;
    setLoading(true);
    if (sub === "matches") apiGet(`/fixtures?league=${comp.id}&season=${comp.season}&status=FT&last=15`).then(d=>{setMatches(d);setLoading(false);}).catch(()=>setLoading(false));
    else if (sub === "standings") apiGet(`/standings?league=${comp.id}&season=${comp.season}`).then(d=>{setStandings(d);setLoading(false);}).catch(()=>setLoading(false));
    else apiGet(`/players/${sType==="scorers"?"topscorers":"topassists"}?league=${comp.id}&season=${comp.season}`).then(d=>{setScorers(d);setLoading(false);}).catch(()=>setLoading(false));
  }, [view, comp, sub, sType]);

  const MCard = ({m}) => {
    const isL = ["1H","2H","HT","ET"].includes(m?.fixture?.status?.short||m?.st);
    const hn = m.teams?.home?.name||m.hn||"";
    const an = m.teams?.away?.name||m.an||"";
    const hl = m.teams?.home?.logo||m.hlogo;
    const al = m.teams?.away?.logo||m.alogo;
    const gh = m.goals?.home??m.gh??"-";
    const ga = m.goals?.away??m.ga??"-";
    const min = m.fixture?.status?.elapsed||m.min;
    return (
      <div onClick={()=>setSelectedMatch(m)} style={{background:T.card,border:`1px solid ${isL?"rgba(28,112,69,.44)":T.border}`,borderRadius:9,marginBottom:6,cursor:"pointer",overflow:"hidden"}}>
        <div style={{padding:"0.42rem 0.8rem",display:"flex",alignItems:"center",gap:6,borderBottom:`1px solid ${T.b2||"rgba(255,255,255,0.03)"}`}}>
          <span style={{fontSize:"0.5rem",color:T.mu}}>{m.league?.name||m.comp}</span>
          {isL && <span style={{background:T.vtV+"22",color:T.vtV,border:`1px solid ${T.vtV}44`,fontSize:"0.44rem",fontWeight:700,padding:"0.1rem 0.4rem",borderRadius:3}}>🔴 {min}'</span>}
          {(m.fixture?.status?.short==="FT"||m.st==="FT") && <span style={{background:T.mu+"22",color:T.mu,fontSize:"0.44rem",fontWeight:700,padding:"0.1rem 0.4rem",borderRadius:3}}>FIN</span>}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",alignItems:"center",padding:"0.72rem 0.9rem",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:7}}>{hl&&<img src={hl} alt="" style={{width:22,height:22,objectFit:"contain"}} onError={e=>e.target.style.display="none"}/>}<span style={{fontWeight:600,fontSize:"0.76rem"}}>{hn}</span></div>
          <div style={{textAlign:"center",minWidth:50}}><div style={{fontWeight:800,fontSize:"1.15rem",color:isL?T.oV:T.blanc,lineHeight:1}}>{gh} – {ga}</div></div>
          <div style={{display:"flex",alignItems:"center",gap:7,flexDirection:"row-reverse"}}>{al&&<img src={al} alt="" style={{width:22,height:22,objectFit:"contain"}} onError={e=>e.target.style.display="none"}/>}<span style={{fontWeight:600,fontSize:"0.76rem",textAlign:"right"}}>{an}</span></div>
        </div>
        <div style={{padding:"0.28rem 0.9rem",textAlign:"right",fontSize:"0.5rem",color:T.oV}}>📊 Stats & Analyse →</div>
      </div>
    );
  };

  return (
    <div>
      <div style={{fontSize:"0.54rem",color:T.oV,fontWeight:700,letterSpacing:"0.16em",textTransform:"uppercase",marginBottom:10,display:"flex",alignItems:"center",gap:8}}>📊 Stats Center · Toutes Compétitions<div style={{flex:1,height:1,background:`linear-gradient(90deg,${T.or}50,transparent)`}}/></div>
      {/* Haïti vs Écosse */}
      <div onClick={()=>setSelectedMatch(HAITI_SCO)} style={{background:"linear-gradient(135deg,rgba(196,18,48,.15),rgba(0,48,135,.15))",border:`1px solid ${T.rv}55`,borderRadius:10,padding:"0.9rem",marginBottom:12,cursor:"pointer"}}>
        <div style={{fontSize:"0.5rem",color:T.oV,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:6,display:"flex",alignItems:"center",gap:4}}><span style={{display:"inline-block",width:6,height:6,background:T.oV,borderRadius:"50%",animation:"blink 1.4s ease-in-out infinite",marginRight:4}}/>🇭🇹 Match récent — Analyse complète disponible</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",alignItems:"center",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}><img src="https://media.api-sports.io/football/teams/511.png" alt="" style={{width:26,height:26,objectFit:"contain"}} onError={e=>e.target.style.display="none"}/><span style={{fontWeight:700,fontSize:"0.8rem"}}>Haïti</span></div>
          <div style={{textAlign:"center"}}><div style={{fontWeight:800,fontSize:"1.5rem",color:T.blanc,lineHeight:1}}>0 – 1</div><div style={{fontSize:"0.5rem",color:T.mu,marginTop:2}}>TERMINÉ · World Cup J1</div></div>
          <div style={{display:"flex",alignItems:"center",gap:6,flexDirection:"row-reverse"}}><img src="https://media.api-sports.io/football/teams/35.png" alt="" style={{width:26,height:26,objectFit:"contain"}} onError={e=>e.target.style.display="none"}/><span style={{fontWeight:700,fontSize:"0.8rem"}}>Écosse</span></div>
        </div>
        <div style={{textAlign:"center",fontSize:"0.5rem",color:T.oV,marginTop:6}}>📊 Overview · Stats · Timeline · Lineups · Joueurs · H2H · Table →</div>
      </div>
      {/* Nav */}
      <div style={{display:"flex",background:T.card,border:`1px solid ${T.border}`,borderRadius:9,overflow:"hidden",marginBottom:12}}>
        {[["live","🔴 Live"],["comp","🏆 Compétitions"]].map(([v,l]) => (
          <button key={v} onClick={()=>setView(v)} style={{flex:1,padding:"0.5rem",background:view===v?T.rv:"transparent",color:view===v?"#fff":T.tx,border:"none",borderRight:`1px solid ${T.border}`,fontSize:"0.62rem",fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{l}</button>
        ))}
      </div>
      {view==="live" && (
        <div>
          {liveM.length===0 && <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:10,padding:"2rem",textAlign:"center"}}><div style={{fontSize:"2rem",opacity:.3,marginBottom:8}}>⚽</div><div style={{fontSize:"0.75rem",color:T.mu}}>Aucun match en direct</div><div style={{fontSize:"0.6rem",color:T.mu,marginTop:4}}>Les matchs apparaissent automatiquement</div></div>}
          {liveM.map((m,i) => <MCard key={i} m={m}/>)}
        </div>
      )}
      {view==="comp" && (
        <div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:12}}>
            {COMPS_LIST.map((c,i) => (
              <button key={i} onClick={()=>{setComp(c);setSub("matches");}} style={{background:comp.id===c.id?T.rv:T.card,border:`1px solid ${comp.id===c.id?T.rv:T.border}`,color:comp.id===c.id?"#fff":T.tx,fontSize:"0.56rem",fontWeight:600,padding:"0.26rem 0.6rem",borderRadius:5,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>{c.name}</button>

          <div style={{display:"flex",background:T.card,border:`1px solid ${T.border}`,borderRadius:9,overflow:"hidden",marginBottom:12}}>

              <button key={v} onClick={()=>setSub(v)} style={{flex:1,padding:"0.48rem",background:sub===v?T.rv:"transparent",color:sub===v?"#fff":T.tx,border:"none",borderRight:`1px solid ${T.border}`,fontSize:"0.58rem",fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{l}</button>
            ))}
          </div>
          {loading && <Spin/>}
          {!loading && sub==="matches" && (
            <div>
              {matches.length===0 && <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:10,padding:"2rem",textAlign:"center"}}><div style={{fontSize:"0.72rem",color:T.mu}}>Aucun match trouvé</div></div>}
              {matches.map((m,i) => <MCard key={i} m={m}/>)}
            </div>
          )}
          {!loading && sub==="standings" && standings.length>0 && (() => {
            const groups = standings[0]?.league?.standings||[];
            return groups.map((grp,gi) => (
              <div key={gi} style={{marginBottom:12}}>
                {groups.length>1 && <div style={{fontSize:"0.58rem",color:T.oV,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:6}}>{grp[0]?.group}</div>}

                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:"0.7rem"}}>
                    <thead><tr style={{background:"rgba(255,255,255,.025)"}}>
                      {["#","Équipe","J","V","N","D","Pts"].map(h=><th key={h} style={{padding:"0.42rem 0.4rem",fontSize:"0.48rem",color:T.mu,fontWeight:400,textAlign:h==="Équipe"?"left":"center"}}>{h}</th>)}
                    </tr></thead>
                    <tbody>
                      {grp.map((row,i) => {
                        const isHT = row.team?.name?.toLowerCase().includes("haïti")||row.team?.name?.toLowerCase().includes("haiti");

                          <tr key={i} style={{background:isHT?"rgba(11,27,94,.2)":"transparent",borderLeft:isHT?`2px solid ${T.rv}`:"none",borderBottom:`1px solid ${T.b2||"rgba(255,255,255,0.03)"}`}}>
                            <td style={{padding:"0.48rem 0.4rem",textAlign:"center",fontWeight:i<2?700:400,color:i<2?T.vtV:T.mu}}>{row.rank}</td>
                            <td style={{padding:"0.48rem 0.4rem"}}><div style={{display:"flex",alignItems:"center",gap:5}}>{row.team?.logo&&<img src={row.team.logo} alt="" style={{width:14,height:14,objectFit:"contain"}} onError={e=>e.target.style.display="none"}/>}<span style={{fontWeight:isHT?700:400,fontSize:"0.68rem"}}>{row.team?.name}</span></div></td>
                            <td style={{padding:"0.48rem 0.4rem",textAlign:"center",color:T.mu}}>{row.all?.played}</td>
                            <td style={{padding:"0.48rem 0.4rem",textAlign:"center",color:T.mu}}>{row.all?.win}</td>
                            <td style={{padding:"0.48rem 0.4rem",textAlign:"center",color:T.mu}}>{row.all?.draw}</td>
                            <td style={{padding:"0.48rem 0.4rem",textAlign:"center",color:T.mu}}>{row.all?.lose}</td>
                            <td style={{padding:"0.48rem 0.4rem",textAlign:"center",fontWeight:800,color:T.blanc}}>{row.points}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            ));
          })()}
          {!loading && sub==="scorers" && (
            <div>
              <div style={{display:"flex",background:T.card,border:`1px solid ${T.border}`,borderRadius:8,overflow:"hidden",marginBottom:10}}>
                {[["scorers","⚽ Top Buteurs"],["assists","🎯 Top Passeurs"]].map(([v,l]) => (
                  <button key={v} onClick={()=>setSType(v)} style={{flex:1,padding:"0.45rem",background:sType===v?T.rv:"transparent",color:sType===v?"#fff":T.tx,border:"none",fontSize:"0.6rem",fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{l}</button>
                ))}
              </div>
              {scorers.slice(0,15).map((p,i) => {
                const st = p.statistics?.[0];
                const val = sType==="scorers" ? st?.goals?.total : st?.goals?.assists;
                return (
                  <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"0.6rem 0.8rem",background:i%2===0?T.card:T.card2,borderRadius:7,marginBottom:4}}>
                    <div style={{width:24,textAlign:"center",fontWeight:800,fontSize:"0.85rem",color:i<3?T.oV:T.mu}}>{i+1}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:"0.78rem"}}>{p.player?.name}</div>
                      <div style={{fontSize:"0.56rem",color:T.mu,display:"flex",alignItems:"center",gap:4}}>{st?.team?.logo&&<img src={st.team.logo} alt="" style={{width:14,height:14,objectFit:"contain"}} onError={e=>e.target.style.display="none"}/>}{st?.team?.name} · {p.player?.nationality}</div>
                    </div>
                    <div style={{fontWeight:800,fontSize:"1.4rem",color:i===0?T.oV:T.rv,lineHeight:1}}>{val??0}</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── COUNTDOWN ──
function useCD(date){
  const [cd,setCd]=useState({d:"--",h:"--",m:"--",s:"--"});
  useEffect(()=>{
    const tick=()=>{
      const diff=new Date(date)-new Date();
      if(diff<=0){setCd({d:"00",h:"00",m:"00",s:"00"});return;}
      setCd({d:String(Math.floor(diff/86400000)).padStart(2,"0"),h:String(Math.floor(diff%86400000/3600000)).padStart(2,"0"),m:String(Math.floor(diff%3600000/60000)).padStart(2,"0"),s:String(Math.floor(diff%60000/1000)).padStart(2,"0")});
    };
    tick();const id=setInterval(tick,1000);return()=>clearInterval(id);
  },[date]);
  return cd;
}

function CDDisplay({date}){
  const cd=useCD(date);
  return React.createElement('div',{style:{display:"flex",gap:"0.7rem"}},
    [["d","Jours"],["h","Hrs"],["m","Min"],["s","Sec"]].map(([k,l])=>
      React.createElement('div',{key:k,style:{textAlign:"center"}},
        React.createElement('div',{style:{fontWeight:800,fontSize:"1.5rem",lineHeight:1,color:C.blanc}},cd[k]),
        React.createElement('div',{style:{fontSize:"0.42rem",color:C.muted,letterSpacing:"0.14em",textTransform:"uppercase",marginTop:2}},l)
      )
    )
  );
}

// ── LIVE SIM + REAL API ──
function useLive(){
  const [live,setLive]=useState(LIVE_INIT);
  const [apiStatus,setApiStatus]=useState("simulation");

  useEffect(()=>{
    // Essayer de fetcher les vrais scores
    const fetchReal=async()=>{
      try{
        const r=await fetch("https://v3.football.api-sports.io/fixtures?live=all",{
          headers:{"x-rapidapi-key":KEYS.FOOTBALL,"x-rapidapi-host":"v3.football.api-sports.io"}
        });
        const j=await r.json();
        if(j.response&&j.response.length>0){
          setLive(j.response.map(m=>({
            id:m.fixture.id,
            hf:"",hn:m.teams.home.name,hlogo:m.teams.home.logo,
            af:"",an:m.teams.away.name,alogo:m.teams.away.logo,
            gh:m.goals.home??0,ga:m.goals.away??0,
            min:m.fixture.status.elapsed||0,
            grp:m.league.round||"?",comp:m.league.name,
            st:m.fixture.status.short,
          })));
          setApiStatus("live");
        } else {
          // Pas de matchs live → simulation
          simUpdate();
        }
      }catch(e){
        simUpdate();
        setApiStatus("simulation");
      }
    };

    const simUpdate=()=>{
      setLive(prev=>prev.map(m=>{
        if(m.st==="FT")return m;
        const min=Math.min((m.min||0)+Math.floor(Math.random()*2+1),90);
        let gh=m.gh,ga=m.ga;
        if(Math.random()<0.04){Math.random()<0.5?gh++:ga++;}
        return{...m,min,gh,ga,st:min>=90?"FT":min>45?"2H":"1H"};
      }));
    };

    fetchReal();
    const id=setInterval(fetchReal,15000);
    return()=>clearInterval(id);
  },[]);

  return {live,apiStatus};
}

// ── FETCH NEWS ──
function useNews(){
  const [news,setNews]=useState(NEWS_INIT);
  useEffect(()=>{
    const fetch_=async()=>{
      try{
        const url=`https://serpapi.com/search.json?q=Haiti+Grenadiers+football+Coupe+Monde+2026&tbm=nws&num=10&hl=fr&api_key=${KEYS.SERP}`;
        const r=await fetch(url);
        const j=await r.json();
        if(j.news_results&&j.news_results.length>0){
          setNews(prev=>[
            ...j.news_results.map((n,i)=>({id:Date.now()+i,tag:i<2?"🔴 BREAKING":"📰 NEWS",title:n.title,source:n.source||"Sport",date:n.date||"Récent",link:n.link||"#",thumbnail:n.thumbnail||null,hot:i<3,pinned:false})),
            ...prev
          ].slice(0,20));
        }
      }catch(e){}
    };
    fetch_();
    const id=setInterval(fetch_,120000);
    return()=>clearInterval(id);
  },[]);
  return {news,setNews};
}
